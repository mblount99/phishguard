<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PhishGuard</title>

<div style="font-size: 11px; color: #64748b;">
  Tip: Paste suspicious links before clicking them
</div>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 14px;
    width: 300px;
    background: #0f172a; /* deep dark blue */
    color: #e2e8f0;
  }

  h1 {
    font-size: 18px;
    margin-bottom: 12px;
    font-weight: 600;
  }

  /* Inputs */
  input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: 1px solid #1e293b;
    background: #020617;
    color: #e2e8f0;
    outline: none;
  }

  input::placeholder,
  textarea::placeholder {
    color: #64748b;
  }

  input:focus,
  textarea:focus {
    border-color: #3b82f6;
  }

  /* Buttons */
  button {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    background: #3b82f6;
    color: white;
    transition: all 0.2s ease;
  }

  button:hover {
    background: #2563eb;
  }

  /* Result Card */
  .card {
    padding: 14px;
    border-radius: 12px;
    margin-top: 14px;
    background: #020617;
    border: 1px solid #1e293b;
  }

  /* Status colors (subtle glow style) */
  .safe {
    border: 1px solid #22c55e;
  }

  .warning {
    border: 1px solid #facc15;
  }

  .danger {
    border: 1px solid #ef4444;
  }

  .status {
    font-size: 15px;
    font-weight: 600;
  }

  .score {
    font-size: 13px;
    margin-top: 4px;
    color: #94a3b8;
  }

  #reasons {
    margin-top: 8px;
    font-size: 12px;
    color: #cbd5f5;
  }

  /* Divider */
  hr {
    border: none;
    border-top: 1px solid #1e293b;
    margin: 14px 0;
  }

  /* Upgrade box */
  #upgradeBox {
    font-size: 12px;
    color: #94a3b8;
  }

  #upgradeBtn {
    background: linear-gradient(90deg, #3b82f6, #6366f1);
  }

  #upgradeBtn:hover {
    opacity: 0.9;
  }
</style>

</head>
<body>

  <h2>PhishGuard</h2>

  <div style="font-size: 12px; color: #64748b;">Scan Website</div>

  <input id="url" placeholder="Paste a URL here..." />
  <button id="scanUrl">Scan URL</button>
  <button id="scanCurrent">Scan Current Site</button>

  <textarea id="email" placeholder="Paste email"></textarea>
  <button id="scanEmail">Analyze Email</button>

<div id="resultCard" class="card">
  <div class="status">Ready</div>
  <div class="score"></div>
  <div id="reasons"></div>
</div>

  <script src="popup.js"></script>

</body>
</html>
